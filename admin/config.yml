# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: Lord-Crixus/Linux
  branch: main
  identity_url: https://auth.decapbridge.com/sites/8b4feef3-2888-4943-9bcd-c683b1bee4b2
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://preeminent-gaufre-4b4156.netlify.app

media_folder: ""
public_folder: ""

collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "settings"
        label: "Stats, Prices & Links"
        file: "content/site-data.json"
        fields:
          - { label: "Win Rate (e.g. 68.4%)", name: "stat_winrate", widget: "string" }
          - { label: "ROI to Stake (e.g. +24.1%)", name: "stat_roi", widget: "string" }
          - { label: "Picks Settled (e.g. 412)", name: "stat_picks", widget: "string" }
          - { label: "Leagues Covered (e.g. 9)", name: "stat_leagues", widget: "string" }
          - { label: "Pro Price (e.g. $25)", name: "price_pro", widget: "string" }
          - { label: "VIP Price (e.g. $59)", name: "price_vip", widget: "string" }
          - { label: "Telegram Link", name: "telegram_url", widget: "string" }
          - { label: "Contact Email", name: "contact_email", widget: "string" }

  - name: "free_picks"
    label: "Free Pick Slips"
    files:
      - name: "picks_info"
        label: "Free Picks Info"
        file: "content/picks-note.json"
        fields:
          - { label: "Note (shown to remind you how to update slip images)", name: "note", widget: "text" }

  - name: "recent_picks"
    label: "Recent Picks Feed"
    files:
      - name: "feed"
        label: "Recent Settled Picks (shows on homepage)"
        file: "content/recent-picks.json"
        fields:
          - label: "Picks"
            name: "picks"
            widget: "list"
            summary: "{{fields.fixture}} — {{fields.result}}"
            fields:
              - { label: "Competition (e.g. EPL)", name: "competition", widget: "string" }
              - label: "Result"
                name: "result"
                widget: "select"
                options: ["Won", "Lost"]
              - { label: "Fixture (e.g. Arsenal vs. Villa)", name: "fixture", widget: "string" }
              - { label: "Pick (e.g. Over 2.5 Goals)", name: "pick", widget: "string" }
