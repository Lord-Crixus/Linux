backend:
  name: git-gateway
  branch: main

media_folder: ""
public_folder: ""

collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "settings"
        label: "Stats, Prices & Links"
        file: "content/site-data.json"
        fields:
          - { label: "Win Rate (e.g. 68.4%)", name: "stat_winrate", widget: "string" }
          - { label: "ROI to Stake (e.g. +24.1%)", name: "stat_roi", widget: "string" }
          - { label: "Picks Settled (e.g. 412)", name: "stat_picks", widget: "string" }
          - { label: "Leagues Covered (e.g. 9)", name: "stat_leagues", widget: "string" }
          - { label: "Pro Price (e.g. $25)", name: "price_pro", widget: "string" }
          - { label: "VIP Price (e.g. $59)", name: "price_vip", widget: "string" }
          - { label: "Telegram Link", name: "telegram_url", widget: "string" }
          - { label: "Contact Email", name: "contact_email", widget: "string" }

  - name: "free_picks"
    label: "Free Pick Slips"
    files:
      - name: "picks_info"
        label: "Free Picks Info"
        file: "content/picks-note.json"
        fields:
          - { label: "Note (shown to remind you how to update slip images)", name: "note", widget: "text" }
